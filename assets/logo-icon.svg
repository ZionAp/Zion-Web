<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <defs>
    <linearGradient id="bgGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2d5a87"/>
    </linearGradient>
    <linearGradient id="screenGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="40" height="40" rx="8" fill="url(#bgGrad4)"/>
  
  <!-- Zia Sun Symbol -->
  <g stroke="#d94a1e" stroke-width="2" stroke-linecap="round">
    <!-- Cardinal rays -->
    <line x1="20" y1="2" x2="20" y2="9"/>
    <line x1="20" y1="11" x2="20" y2="17"/>
    <line x1="20" y1="23" x2="20" y2="29"/>
    <line x1="20" y1="31" x2="20" y2="38"/>
    <line x1="2" y1="20" x2="9" y2="20"/>
    <line x1="11" y1="20" x2="17" y2="20"/>
    <line x1="23" y1="20" x2="29" y2="20"/>
    <line x1="31" y1="20" x2="38" y2="20"/>
    <!-- Intercardinal -->
    <line x1="7" y1="7" x2="11" y2="11"/>
    <line x1="29" y1="29" x2="33" y2="33"/>
    <line x1="33" y1="7" x2="29" y2="11"/>
    <line x1="11" y1="29" x2="7" y2="33"/>
  </g>
  
  <!-- Center Circle - Multimeter -->
  <circle cx="20" cy="20" r="6" fill="#ffffff" stroke="#d94a1e" stroke-width="1.5"/>
  
  <!-- Multimeter Display -->
  <rect x="15" y="16" width="10" height="4" rx="0.5" fill="url(#screenGrad2)"/>
  
  <!-- Digital Display -->
  <text x="16" y="19" font-family="monospace" font-size="2.5" fill="#4ade80">12.4</text>
  
  <!-- Buttons -->
  <circle cx="16" cy="23" r="1.1" fill="#dc2626"/>
  <circle cx="20" cy="23" r="1.1" fill="#22c55e"/>
  <circle cx="24" cy="23" r="1.1" fill="#16a34a"/>
  
  <!-- Dial -->
  <circle cx="22" cy="18" r="1.5" fill="#475569" stroke="#64748b" stroke-width="0.3"/>
  <line x1="22" y1="17" x2="22" y2="18" stroke="#ffffff" stroke-width="0.3"/>
</svg>