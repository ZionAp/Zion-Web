<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <defs>
    <linearGradient id="toolGradIcon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="40" height="40" rx="8" fill="#1e3a5f"/>
  
  <!-- Mini Zia Sun Symbol -->
  <g stroke="#d94a1e" stroke-width="1.5" stroke-linecap="round">
    <!-- Top/Bottom rays -->
    <line x1="20" y1="6" x2="20" y2="11"/>
    <line x1="20" y1="29" x2="20" y2="34"/>
    
    <!-- Left/Right rays -->
    <line x1="6" y1="20" x2="11" y2="20"/>
    <line x1="29" y1="20" x2="34" y2="20"/>
    
    <!-- Diagonal rays -->
    <line x1="10" y1="10" x2="13" y2="13"/>
    <line x1="27" y1="27" x2="30" y2="30"/>
    <line x1="30" y1="10" x2="27" y2="13"/>
    <line x1="13" y1="27" x2="10" y2="30"/>
  </g>
  
  <!-- Center -->
  <circle cx="20" cy="20" r="4" fill="#ffffff" stroke="#d94a1e" stroke-width="1"/>
  
  <!-- Wrench -->
  <g transform="translate(16, 16)">
    <rect x="0" y="0" width="2" height="8" rx="0.5" fill="url(#toolGradIcon)"/>
    <path d="M -0.5,8 L 1,11 L 2.5,8 Z" fill="url(#toolGradIcon)"/>
  </g>
</svg>