<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2d5a87"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="40" height="40" rx="8" fill="url(#bgGrad2)"/>
  
  <!-- Zia Sun Symbol -->
  <g stroke="#d94a1e" stroke-width="2.5" stroke-linecap="round">
    <!-- Top/Bottom -->
    <line x1="20" y1="5" x2="20" y2="11"/>
    <line x1="20" y1="14" x2="20" y2="17"/>
    <line x1="20" y1="29" x2="20" y2="35"/>
    <!-- Left/Right -->
    <line x1="5" y1="20" x2="11" y2="20"/>
    <line x1="14" y1="20" x2="17" y2="20"/>
    <line x1="29" y1="20" x2="35" y2="20"/>
    <!-- Diagonals -->
    <line x1="10" y1="10" x2="13" y2="13"/>
    <line x1="27" y1="27" x2="30" y2="30"/>
    <line x1="30" y1="10" x2="27" y2="13"/>
    <line x1="10" y1="30" x2="13" y2="27"/>
  </g>
  
  <!-- Center Circle with Multimeter -->
  <circle cx="20" cy="20" r="6" fill="#ffffff" stroke="#d94a1e" stroke-width="1.5"/>
  
  <!-- Multimeter Display -->
  <rect x="16" y="17" width="8" height="3" rx="0.5" fill="#1e3a5f"/>
  <line x1="17" y1="18.5" x2="18" y2="18.5" stroke="#4ade80" stroke-width="0.5"/>
  
  <!-- Multimeter Buttons -->
  <circle cx="17" cy="21.5" r="1" fill="#c41e3a"/>
  <circle cx="20" cy="21.5" r="1" fill="#4ade80"/>
  <circle cx="23" cy="21.5" r="1" fill="#22c55e"/>
</svg>