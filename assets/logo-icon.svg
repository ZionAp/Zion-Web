<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <defs>
    <linearGradient id="bgGrad6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="50%" style="stop-color:#2d5a87"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <linearGradient id="screenGrad6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="0.3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="40" height="40" rx="8" fill="url(#bgGrad6)"/>
  
  <!-- Zia Sun Symbol -->
  <g stroke="#d94a1e" stroke-width="1.8" stroke-linecap="round">
    <!-- Cardinal -->
    <line x1="20" y1="2" x2="20" y2="9"/>
    <line x1="20" y1="11" x2="20" y2="16"/>
    <line x1="20" y1="24" x2="20" y2="29"/>
    <line x1="20" y1="31" x2="20" y2="38"/>
    <line x1="2" y1="20" x2="9" y2="20"/>
    <line x1="11" y1="20" x2="16" y2="20"/>
    <line x1="24" y1="20" x2="29" y2="20"/>
    <line x1="31" y1="20" x2="38" y2="20"/>
    <!-- Intercardinal -->
    <line x1="9" y1="9" x2="12" y2="12"/>
    <line x1="28" y1="28" x2="31" y2="31"/>
    <line x1="31" y1="9" x2="28" y2="12"/>
    <line x1="12" y1="28" x2="9" y2="31"/>
  </g>
  
  <!-- Center Circle - Multimeter -->
  <circle cx="20" cy="20" r="7" fill="#ffffff" stroke="#d94a1e" stroke-width="1.5"/>
  
  <!-- Display -->
  <rect x="15" y="16" width="10" height="5" rx="0.5" fill="url(#screenGrad6)" stroke="#1e3a5f" stroke-width="0.3"/>
  
  <!-- Digital Reading -->
  <g filter="url(#glow2)">
    <text x="16" y="19.5" font-family="'Courier New', monospace" font-size="3" font-weight="bold" fill="#4ade80">120V</text>
  </g>
  
  <!-- Buttons -->
  <circle cx="16" cy="22.5" r="1.4" fill="#dc2626"/>
  <circle cx="20" cy="22.5" r="1.4" fill="#22c55e"/>
  <circle cx="24" cy="22.5" r="1.4" fill="#16a34a"/>
  
  <!-- Dial -->
  <circle cx="23" cy="17.5" r="2" fill="#475569" stroke="#64748b" stroke-width="0.3"/>
  <line x1="22.5" y1="16" x2="22.5" y2="17" stroke="#ffffff" stroke-width="0.5"/>
  
  <!-- Label -->
  <text x="20" y="19" text-anchor="middle" font-family="Arial" font-size="1" fill="#94a3b8">AC</text>
</svg>