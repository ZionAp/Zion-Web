<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <defs>
    <linearGradient id="lg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2d5a87"/>
    </linearGradient>
    <linearGradient id="scr2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#94a3b8"/>
      <stop offset="100%" style="stop-color:#64748b"/>
    </linearGradient>
    <linearGradient id="mm2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#cbd5e1"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="40" height="40" rx="8" fill="url(#lg2)"/>
  
  <!-- Multimeter - Left Side -->
  <rect x="4" y="4" width="17" height="32" rx="2.5" fill="url(#mm2)" stroke="#475569" stroke-width="1"/>
  <!-- Screen -->
  <rect x="6" y="6" width="13" height="7" rx="1" fill="#0a1628"/>
  <text x="7.5" y="11" font-family="monospace" font-size="3.5" fill="#4ade80" font-weight="bold">12V</text>
  <!-- Dial -->
  <circle cx="12.5" cy="17" r="2.5" fill="#475569" stroke="#334155" stroke-width="0.5"/>
  <line x1="12.5" y1="15" x2="12.5" y2="17" stroke="#fbbf24" stroke-width="0.5"/>
  <!-- Buttons -->
  <circle cx="8" cy="22" r="1.2" fill="#dc2626"/>
  <circle cx="12.5" cy="22" r="1.2" fill="#22c55e"/>
  <circle cx="17" cy="22" r="1.2" fill="#475569"/>
  <!-- Body bottom -->
  <rect x="8" y="26" width="9" height="8" rx="1.5" fill="#475569"/>
  
  <!-- Screwdriver - Right Side -->
  <g transform="rotate(-25, 30, 20)">
    <!-- Handle -->
    <rect x="26" y="4" width="8" height="14" rx="2" fill="#d94a1e"/>
    <rect x="27" y="6" width="2" height="3" rx="0.5" fill="#fbbf24"/>
    <rect x="27" y="10" width="2" height="3" rx="0.5" fill="#fbbf24"/>
    <!-- Shaft -->
    <rect x="28.5" y="18" width="3" height="14" rx="0.5" fill="url(#scr2)"/>
    <!-- Tip -->
    <polygon points="28.5,32 31.5,32 30.5,36 29.5,36" fill="#94a3b8"/>
  </g>
</svg>