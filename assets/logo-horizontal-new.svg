<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 60" width="300" height="60">
  <defs>
    <linearGradient id="toolGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
  </defs>
  
  <!-- Logo Icon -->
  <g transform="translate(5, 10)">
    <rect width="40" height="40" rx="8" fill="#1e3a5f"/>
    
    <!-- Zia Sun Symbol -->
    <g stroke="#d94a1e" stroke-width="1.5" stroke-linecap="round">
      <line x1="20" y1="6" x2="20" y2="11"/>
      <line x1="20" y1="29" x2="20" y2="34"/>
      <line x1="6" y1="20" x2="11" y2="20"/>
      <line x1="29" y1="20" x2="34" y2="20"/>
      <line x1="10" y1="10" x2="13" y2="13"/>
      <line x1="27" y1="27" x2="30" y2="30"/>
      <line x1="30" y1="10" x2="27" y2="13"/>
      <line x1="13" y1="27" x2="10" y2="30"/>
    </g>
    
    <!-- Center -->
    <circle cx="20" cy="20" r="4" fill="#ffffff" stroke="#d94a1e" stroke-width="1"/>
    
    <!-- Wrench -->
    <g transform="translate(16, 16)">
      <rect x="0" y="0" width="2" height="8" rx="0.5" fill="url(#toolGrad)"/>
      <path d="M -0.5,8 L 1,11 L 2.5,8 Z" fill="url(#toolGrad)"/>
    </g>
  </g>
  
  <!-- Text -->
  <text x="55" y="28" font-family="Arial, sans-serif" font-size="20" font-weight="800" fill="#1e3a5f">ZION APPLIANCE</text>
  <text x="55" y="45" font-family="Arial, sans-serif" font-size="11" font-weight="500" fill="#64748b">SOLUTIONS</text>
  
  <!-- Accent -->
  <circle cx="175" cy="25" r="3" fill="#d94a1e"/>
</svg>