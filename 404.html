<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found | Zion Appliance Solutions</title>
    <meta name="robots" content="noindex" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        text-align: center;
        padding: 20px;
      }
      .container { max-width: 500px; }
      .error-code {
        font-size: 120px;
        font-weight: 800;
        opacity: 0.3;
        line-height: 1;
      }
      h1 { font-size: 2rem; margin: 20px 0; }
      p { opacity: 0.8; margin-bottom: 30px; font-size: 1.1rem; }
      .btn {
        display: inline-block;
        padding: 16px 32px;
        background: #d94a1e;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        font-weight: 600;
        transition: background 0.3s;
      }
      .btn:hover { background: #c73d15; }
      .phone {
        margin-top: 30px;
        font-size: 1.25rem;
      }
      .phone a { color: #4ade80; text-decoration: none; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="error-code">404</div>
      <h1>Page Not Found</h1>
      <p>The page you're looking for doesn't exist or has been moved.</p>
      <a href="/" class="btn">Go to Homepage</a>
      <div class="phone">
        Or call us directly: <a href="tel:5055088203">(505) 508-8203</a>
      </div>
    </div>
  </body>
</html>
