<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="toolGradFav" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#1e3a5f"/>
  
  <!-- Zia Sun Symbol -->
  <g stroke="#d94a1e" stroke-width="2.5" stroke-linecap="round">
    <!-- Top/Bottom rays -->
    <line x1="32" y1="8" x2="32" y2="16"/>
    <line x1="32" y1="48" x2="32" y2="56"/>
    
    <!-- Left/Right rays -->
    <line x1="8" y1="32" x2="16" y2="32"/>
    <line x1="48" y1="32" x2="56" y2="32"/>
    
    <!-- Diagonal rays -->
    <line x1="16" y1="16" x2="21" y2="21"/>
    <line x1="43" y1="43" x2="48" y2="48"/>
    <line x1="48" y1="16" x2="43" y2="21"/>
    <line x1="21" y1="43" x2="16" y2="48"/>
  </g>
  
  <!-- Center Circle -->
  <circle cx="32" cy="32" r="7" fill="#ffffff" stroke="#d94a1e" stroke-width="1.5"/>
  
  <!-- WrenchIcon -->
  <g transform="translate(25, 25)">
    <rect x="0" y="0" width="3" height="12" rx="1" fill="url(#toolGradFav)"/>
    <path d="M -1,12 L1.5,18 L4,12 Z" fill="url(#toolGradFav)"/>
  </g>
</svg>