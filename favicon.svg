<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2d5a87"/>
    </linearGradient>
    <linearGradient id="scr" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#94a3b8"/>
      <stop offset="100%" style="stop-color:#64748b"/>
    </linearGradient>
    <linearGradient id="mm" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#cbd5e1"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="url(#lg1)"/>
  
  <!-- Multimeter Body -->
  <rect x="6" y="6" width="28" height="52" rx="4" fill="url(#mm)" stroke="#475569" stroke-width="1.5"/>
  
  <!-- Multimeter Screen -->
  <rect x="9" y="9" width="22" height="12" rx="2" fill="#0a1628"/>
  <text x="11" y="18" font-family="monospace" font-size="6" fill="#4ade80" font-weight="bold">12.4V</text>
  
  <!-- Multimeter Dial -->
  <circle cx="20" cy="26" r="4" fill="#475569" stroke="#334155" stroke-width="1"/>
  <line x1="20" y1="23.5" x2="20" y2="26" stroke="#fbbf24" stroke-width="1"/>
  <text x="17" y="24" font-family="sans-serif" font-size="2.5" fill="#94a3b8">V</text>
  <text x="22" y="27.5" font-family="sans-serif" font-size="2.5" fill="#94a3b8">Ω</text>
  
  <!-- Multimeter Probes -->
  <circle cx="13" cy="36" r="2" fill="#dc2626"/>
  <circle cx="13" cy="42" r="2" fill="#1e3a5f"/>
  
  <!-- Multimeter Buttons -->
  <rect x="23" y="33" width="8" height="3" rx="1" fill="#94a3b8"/>
  <rect x="23" y="38" width="8" height="3" rx="1" fill="#22c55e"/>
  <rect x="23" y="43" width="8" height="3" rx="1" fill="#475569"/>
  
  <!-- Screwdriver -->
  <g transform="rotate(-30, 48, 32)">
    <!-- Handle -->
    <rect x="42" y="10" width="12" height="20" rx="3" fill="#d94a1e"/>
    <rect x="44" y="12" width="3" height="4" rx="1" fill="#fbbf24"/>
    <rect x="44" y="18" width="3" height="4" rx="1" fill="#fbbf24"/>
    <!-- Shaft -->
    <rect x="46" y="30" width="4" height="22" rx="1" fill="url(#scr)"/>
    <!-- Tip -->
    <polygon points="46,52 50,52 49,58 47,58" fill="#94a3b8"/>
  </g>
</svg>