<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2d5a87"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="url(#bgGrad3)"/>
  
  <!-- Zia Sun Symbol - New Mexico -->
  <g stroke="#d94a1e" stroke-width="3" stroke-linecap="round">
    <!-- Cardinal rays (North, South, East, West) -->
    <line x1="32" y1="4" x2="32" y2="14"/>
    <line x1="32" y1="18" x2="32" y2="28"/>
    <line x1="32" y1="50" x2="32" y2="60"/>
    <line x1="32" y1="36" x2="32" y2="46"/>
    <line x1="4" y1="32" x2="14" y2="32"/>
    <line x1="18" y1="32" x2="28" y2="32"/>
    <line x1="50" y1="32" x2="60" y2="32"/>
    <line x1="36" y1="32" x2="46" y2="32"/>
    <!-- Intercardinal rays -->
    <line x1="12" y1="12" x2="18" y2="18"/>
    <line x1="46" y1="46" x2="52" y2="52"/>
    <line x1="52" y1="12" x2="46" y2="18"/>
    <line x1="18" y1="46" x2="12" y2="52"/>
  </g>
  
  <!-- Center Circle - Multimeter -->
  <circle cx="32" cy="32" r="10" fill="#ffffff" stroke="#d94a1e" stroke-width="2"/>
  
  <!-- Multimeter Display -->
  <rect x="24" y="26" width="16" height="7" rx="1" fill="url(#screenGrad)"/>
  
  <!-- Digital Display Content -->
  <text x="27" y="31" font-family="monospace" font-size="4" fill="#4ade80">12.4</text>
  <text x="33" y="31" font-family="sans-serif" font-size="2.5" fill="#64748b">V</text>
  
  <!-- Multimeter Buttons -->
  <circle cx="26" cy="36" r="1.8" fill="#dc2626"/>
  <circle cx="32" cy="36" r="1.8" fill="#22c55e"/>
  <circle cx="38" cy="36" r="1.8" fill="#16a34a"/>
  
  <!-- Dial -->
  <circle cx="35" cy="29" r="2.5" fill="#475569" stroke="#64748b" stroke-width="0.5"/>
  <line x1="35" y1="27" x2="35" y2="29" stroke="#ffffff" stroke-width="0.5"/>
</svg>